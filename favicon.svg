<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a" stroke="#FF6600" stroke-width="2"/>
  
  <!-- Chart Icon - Rising Trend -->
  <g transform="translate(20, 25)">
    <!-- Chart Bars -->
    <rect x="5" y="35" width="8" height="15" fill="#FF6600" opacity="0.6"/>
    <rect x="18" y="28" width="8" height="22" fill="#FF6600" opacity="0.7"/>
    <rect x="31" y="20" width="8" height="30" fill="#FF6600" opacity="0.8"/>
    <rect x="44" y="10" width="8" height="40" fill="#FF6600"/>
    
    <!-- Rising Arrow -->
    <path d="M 48 8 L 58 8 L 58 18 M 58 8 L 52 14" 
          stroke="#FF8533" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
  
  <!-- Insight Symbol - Eye/Target -->
  <g transform="translate(50, 60)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#FF8533" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#FF6600"/>
  </g>
</svg>
